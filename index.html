<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Cs/design.css">
    <link rel="shortcut icon" href="Img/favicon.ico">
    <title>TopDownShooter</title>
</head>
<body>
    <header>
        <h1>TopDownShooter</h1>
    </header>

    <div class="Borders">
        <div class="Middle"><canvas id="player"></canvas></div>
        <div class="animate">
            <label for="animations"></label>
            <select id="animations" name="animations">
                <option value="idle">Idle</option>
                <option value="jump">Jump</option>
                <option value="fall">Fall</option>
                <option value="run">Run</option>
                <option value="dizzy">Dizzy</option>
                <option value="sit">Sit</option>
                <option value="roll">Roll</option>
                <option value="bite">Bite</option>
                <option value="ko">KO</option>
                <option value="getHit">Get hit</option>
            </select>
        </div>
            
        </div>
    </div>

    <script src="JavaScript/canvas.js"></script>

    <footer>
        <a href="https://github.com/STVcybergameunity?tab=repositories" target="_blank">My github</a>
    </footer>
</body>
</html>
